                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (g) cameraLauncher.launch(null) else Toast.makeText(context, "需要相机权限", Toast.LENGTH_SHORT).show()
